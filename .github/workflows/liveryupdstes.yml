name: Livery Updates

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  send-message:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install dependencies
        run: pip install discord-webhook requests

      - name: Run Discord webhook script
        env:
          LIVERYUPDATES: ${{ secrets.LIVERYUPDATES }}
          GITHUB_SHA: ${{ github.sha }}
        run: python3 .webhook/liveryupdates.py
